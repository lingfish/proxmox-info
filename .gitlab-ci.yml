image: python:latest

# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

default:
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
    policy: pull-push

stages:
  - prepare
  - test
  - build
  - pypi
  - release

workflow:
  rules:
    - if: $CI_COMMIT_TITLE =~ /Add changelog for version .*/
      when: never
    - when: always

prepare:
  stage: prepare
  tags:
    - docker
  image: "python:latest"
  rules:
    - if: $CI_COMMIT_TAG                 # Run this job when a tag is created
  script:
    - 'curl -H "PRIVATE-TOKEN: $CI_API_TOKEN" -X POST "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/changelog?version=$CI_COMMIT_TAG"'

test:
  stage: test
  tags:
    - docker
  image: "python:$VERSION"
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  script:
    - python --version ; pip --version  # For debugging
    - pip install hatch
    - hatch test --cover
  parallel:
    matrix:
      - VERSION: ['3.10', '3.11', '3.12']
  # Can't do this yet until PR https://github.com/pypa/hatch/pull/2232 done
  # artifacts:
  #   when: always
  #   reports:
  #     coverage_report:
  #       coverage_format: cobertura
  #       path: coverage.xml
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'

build:
  stage: build
  tags:
    - docker
  image: "python:latest"
  script:
    - apt-get update
    - pip install hatch
    - hatch build
  artifacts:
    paths:
      - dist/

pypi_test:
  stage: pypi
  tags:
    - docker
  image: "python:latest"
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  variables:
    HATCH_INDEX_USER: $PYPI_TEST_USERNAME
    HATCH_INDEX_AUTH: $PYPI_TEST_PASSWORD
  script:
    - apt-get update
    - pip install hatch
    - ls -l dist/
    - hatch publish

pypi_prod:
  stage: pypi
  tags:
    - docker
  image: "python:latest"
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    HATCH_INDEX_USER: $PYPI_PROD_USERNAME
    HATCH_INDEX_AUTH: $PYPI_PROD_PASSWORD
  script:
    - apt-get update
    - pip install hatch
    - hatch publish

release_job:
  stage: release
  tags:
    - docker
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG                 # Run this job when a tag is created
  script:
    - echo "running release_job"
  release:                               # See https://docs.gitlab.com/ee/ci/yaml/#release for available properties
    tag_name: '$CI_COMMIT_TAG'
    description: '$CI_COMMIT_TAG'
